# pcb2gcode config for the drill pass — converts the Excellon drill file to
# G-code with pauses for bit changes. See README.md in this folder.
#
# EDIT the three paths below to point at your KiCad plot output.
drill=Controler/output/Controler.drl
drill-output = Controler.drl.gcode
output-dir=Controler/output
# Specific preamble that repositions the drill after the pen pass.
preamble=preamble_for_drill.ngc
postamble=postamble.ngc

# Common options
metric=true
metricoutput=true
zchange=30.0000
zero-start=false
zsafe=5.0000
software=custom

# Drill options
drill-feed=200
drill-side=back
drill-speed=10000
milldrill=false
nog81=true
onedrill=false
zdrill=-2.5000

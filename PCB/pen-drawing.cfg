# pcb2gcode config for the marker (pen) pass — draws the traces with a
# permanent marker as etch resist. See README.md in this folder.
#
# EDIT the three paths below to point at your KiCad plot output.
back=Controler/output/Controler-B_Cu.gbr
back-output = Controler-B_Cu.gbr.gcode
output-dir=Controler/output
preamble=preamble.ngc
postamble=postamble.ngc

# Common options
metric=true
metricoutput=true
zchange=10.0000
zero-start=false
zsafe=5.0000
software=custom
optimise=0

# Mill options
extra-passes=0
mill-feed=600
mill-speed=10000
zwork=-0.0500
invert-gerbers=true  # So that we fill in the middle.
mill-diameters=0.4mm  # This is how wide a mark your marker makes.
milling-overlap=25%  # This is how much overlap you want on those marker lines.
isolation-width=2000mm  # This will fill in up to 2 meters in width, which is plenty for all your traces.
